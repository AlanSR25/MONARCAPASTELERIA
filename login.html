<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monarca Pastelería | Acceso Exclusivo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <!-- Navigation Bar -->
    <monarca-navbar></monarca-navbar>

    <main class="auth-container">
        <div class="auth-box reveal fade-up">
            <div class="auth-header">
                <h2>Acceso Privado</h2>
                <p>Ingresa a tu cuenta para administrar tus colecciones y pedidos personalizados.</p>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="auth-actions">
                    <button type="submit" class="btn btn-gold-filled btn-full">Iniciar Sesión</button>
                </div>
                
                <div class="auth-footer">
                    <p>¿Aún no tienes cuenta? <a href="#" onclick="toggleAuthMode()" class="gold-link">Crear perfil</a></p>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="reg-name">Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Tu nombre y apellido" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="reg-telefono">Teléfono (WhatsApp)</label>
                    <input type="tel" id="reg-telefono" placeholder="5512345678" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-direccion">Dirección de Envío Principal</label>
                    <input type="text" id="reg-direccion" placeholder="Calle, Número, Colonia, C.P." required>
                </div>
                
                <div class="auth-actions">
                    <button type="submit" class="btn btn-black btn-full">Unirse a la Colección</button>
                </div>
                
                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="#" onclick="toggleAuthMode()" class="gold-link">Inicia sesión</a></p>
                </div>
            </form>
        </div>
    </main>

    <monarca-footer></monarca-footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="tienda.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        // Simple UI toggle for the forms 
        function toggleAuthMode() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const authTitle = document.querySelector('.auth-header h2');
            const authDesc = document.querySelector('.auth-header p');

            if (loginForm.classList.contains('hidden')) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                authTitle.innerText = "Acceso Privado";
                authDesc.innerText = "Ingresa a tu cuenta para administrar tus colecciones y pedidos personalizados.";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                authTitle.innerText = "Registro Exclusivo";
                authDesc.innerText = "Crea tu perfil para solicitar diseños únicos y acceder a nuestra colección privada.";
            }
        }
        
        // Supabase Real Integration
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Cargando...";
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await window.DB.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert("Error al iniciar sesión: Verifica que tus datos sean correctos.");
                console.error(error);
                btn.innerText = originalText;
                btn.disabled = false;
            } else {
                // Verificar Rol para re-dirigir a POS o Perfil
                if (data.session && data.session.user) {
                    const { data: perfilData } = await window.DB.from('perfiles_cliente').select('id_rol').eq('id', data.session.user.id).single();
                    if (perfilData && (perfilData.id_rol === 1 || perfilData.id_rol === 3)) {
                        window.location.href = "pos.html";
                        return;
                    }
                }
                window.location.href = "perfil.html";
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Creando cuenta...";
            btn.disabled = true;

            const nombre = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const telefono = document.getElementById('reg-telefono').value;
            const direccion = document.getElementById('reg-direccion').value;

            const { data, error } = await window.DB.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        nombre_completo: nombre
                    }
                }
            });

            if (error) {
                alert("Error al registrarse: " + error.message);
                console.error(error);
                btn.innerText = originalText;
                btn.disabled = false;
            } else {
                // Guardar como predeterminados en la tabla pública usando UPSERT para sobreescribir el Trigger automático de DB
                if (data.user) {
                     const { error: profileError } = await window.DB.from('perfiles_cliente').upsert({
                         id: data.user.id,
                         nombre_completo: nombre,
                         telefono: telefono,
                         direccion_principal: direccion
                     });
                     if (profileError) {
                         alert("Advertencia: El perfil se creó, pero falló al guardar el teléfono (" + profileError.message + "). Podrás modificarlo en tu panel Couture.");
                         console.error("Error al guardar detalles de perfil:", profileError);
                     }
                }
                window.location.href = "perfil.html";
            }
        });
    </script>
</body>
</html>
